apiVersion: apps/v1
kind: Deployment
metadata:
    name: n8n
spec:
    replicas: 1
    revisionHistoryLimit: 2
    selector:
        matchLabels:
            app: n8n
    template:
        metadata:
            labels:
                app: n8n
        spec:
            containers:
                - name: n8n
                  image: n8nio/n8n:latest
                  securityContext:
                      privileged: true
                  env:
                      - name: DB_TYPE
                        value: postgresdb
                      - name: DB_POSTGRESDB_HOST
                        value: postgres-svc.psql.svc.cluster.local
                      - name: DB_POSTGRESDB_PORT
                        value: "5432"
                      - name: DB_POSTGRESDB_DATABASE
                        value: n8n
                      - name: DB_POSTGRESDB_USER
                        value: n8n
                      - name: DB_POSTGRESDB_PASSWORD
                        valueFrom:
                            secretKeyRef:
                                name: n8n-env
                                key: DB_POSTGRESDB_PASSWORD
                      - name: GENERIC_TIMEZONE
                        value: America/New_York
                      - name: TZ
                        value: America/New_York
                      - name: N8N_HOST
                        value: automation.kwkc.xyz
                      - name: N8N_PORT
                        value: "5678"
                      - name: N8N_PROXY_HOPS # trying to fix x-forwarded-for errors
                        value: "1"
                      - name: NODES_EXCLUDE
                        value: "[]"
                      - name: WEBHOOK_URL
                        value: "https://automation.kwkc.xyz"
                      - name: WEBHOOK_TUNNEL_URL
                        value: "http://n8n.kwkc.xyz:30080"
                      - name: N8N_SECURE_COOKIE
                        value: "false"
                      - name: N8N_SKIP_AUTH_ON_OAUTH_CALLBACK
                        value: "true"
                      - name: N8N_LICENSE_ACTIVATION_KEY
                        valueFrom:
                            secretKeyRef:
                                name: n8n-env
                                key: N8N_LICENSE_ACTIVATION_KEY
                      - name: N8N_ENCRYPTION_KEY
                        valueFrom:
                            secretKeyRef:
                                name: n8n-env
                                key: N8N_ENCRYPTION_KEY
                      - name: N8N_MIGRATE_FS_STORAGE_PATH
                        value: "true"
                      - name: N8N_RUNNERS_MODE
                        value: "external"
                      - name: N8N_RUNNERS_BROKER_LISTEN_ADDRESS
                        value: "0.0.0.0"
                      - name: N8N_RUNNERS_AUTH_TOKEN
                        valueFrom:
                            secretKeyRef:
                                name: n8n-env
                                key: N8N_RUNNERS_AUTH_TOKEN
                      - name: N8N_RUNNERS_EXTERNAL_ALLOW
                        value: "*"
                  resources:
                      limits:
                          memory: "1024Mi"
                          cpu: "1000m"
                      requests:
                          memory: "512Mi"
                          cpu: "500m"
                  volumeMounts:
                      - mountPath: /home/node/.n8n
                        name: n8n-nfs-mount
                  ports:
                      # - containerPort: 80
                      #   name: http
                      #   protocol: TCP
                      - containerPort: 5678
                        name: n8n
                        protocol: TCP
                      - containerPort: 5679
                        name: n8n-broker
                        protocol: TCP
                - name: task-runners
                  image: n8nio/runners:latest
                  env:
                      - name: N8N_RUNNERS_TASK_BROKER_URI
                        value: http://127.0.0.1:5679
                      - name: N8N_RUNNERS_AUTO_SHUTDOWN_TIMEOUT
                        value: "15"
                      - name: N8N_RUNNERS_AUTH_TOKEN
                        valueFrom:
                            secretKeyRef:
                                name: n8n-env
                                key: N8N_RUNNERS_AUTH_TOKEN
                  resources:
                      limits:
                          memory: "1024Mi"
                          cpu: "500m"
                      requests:
                          memory: "512Mi"
                          cpu: "256m"
                #### moved the database to the common postgresql instance in psql namespace
                # - name: postgres
                #   image: postgres:15
                #   env:
                #       - name: POSTGRES_DB
                #         value: n8n
                #       - name: POSTGRES_USER
                #         value: n8n
                #       - name: POSTGRES_PASSWORD
                #         valueFrom:
                #             secretKeyRef:
                #                 name: n8n-env
                #                 key: DB_POSTGRESDB_PASSWORD
                #   ports:
                #       - containerPort: 5432
                #   resources:
                #       limits:
                #           cpu: 512m
                #           memory: 256Mi
                #       requests:
                #           cpu: 256m
                #           memory: 128Mi
                #   volumeMounts:
                #       - mountPath: /var/lib/postgresql/data
                #         name: pgsql-nfs-mount
                - name: nginx
                  image: kklein90/n8n-nginx:latest
                  ports:
                      - containerPort: 80
                  resources:
                      limits:
                          cpu: 256m
                          memory: 64Mi
                      requests:
                          cpu: 256m
                          memory: 64Mi
            volumes:
                - name: pgsql-nfs-mount
                  nfs:
                      server: k8s-master.kwkc.home
                      path: /mnt/postgres
                      readOnly: false
                - name: n8n-nfs-mount
                  nfs:
                      server: k8s-master.kwkc.home
                      path: /mnt/n8n
                      readOnly: false
